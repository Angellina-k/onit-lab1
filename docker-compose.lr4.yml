services:
  db:
    image: postgres:15
    container_name: lr4_tasks_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app1:
    build: .
    container_name: app1
    restart: always
    env_file:
      - .env
    environment:
      NODE_NAME: "Нода 1"
    depends_on:
      db:
        condition: service_healthy

  app2:
    build: .
    container_name: app2
    restart: always
    env_file:
      - .env
    environment:
      NODE_NAME: "Нода 2"
    depends_on:
      db:
        condition: service_healthy

  app3:
    build: .
    container_name: app3
    restart: always
    env_file:
      - .env
    environment:
      NODE_NAME: "Нода 3"
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:latest
    container_name: nginx_round_robin
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3